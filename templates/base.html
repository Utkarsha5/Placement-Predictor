<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusML | AI Placement Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        // Logic for Dark Mode Toggle
        tailwind.config = { darkMode: 'class' }
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        }
        window.onload = () => {
            if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .dark .glass { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); }
        .mesh-bg {
            background-color: #f8fafc;
            background-image: radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.05) 0, transparent 50%), 
                              radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.05) 0, transparent 50%);
        }
        .dark .mesh-bg { background-color: #020617; background-image: none; }
    </style>
</head>
<body class="mesh-bg flex flex-col min-h-screen text-slate-900 dark:text-slate-100 transition-colors duration-300">

    <!-- Navbar -->
    <nav class="sticky top-0 z-50 glass border-b border-slate-200 dark:border-slate-800">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex justify-between items-center py-4">
                <div class="flex items-center space-x-3">
                    <div class="bg-indigo-600 p-2 rounded-lg shadow-lg">
                        <i class="fas fa-graduation-cap text-white text-xl"></i>
                    </div>
                    <a href="/" class="font-extrabold text-2xl tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-indigo-500 to-violet-500">
                        CampusML
                    </a>
                </div>
                
                <div class="flex items-center space-x-8">
                    <a href="/" class="hidden md:block text-slate-600 dark:text-slate-400 hover:text-indigo-500 font-semibold transition">Home</a>
                    <a href="/predictor" class="text-slate-600 dark:text-slate-400 hover:text-indigo-500 font-semibold transition">Predictor</a>
                    <a href="/gym" class="text-slate-600 dark:text-slate-400 hover:text-indigo-500 font-semibold transition">Gym</a>
                    
                    <!-- Dark Mode Toggle Button -->
                    <button onclick="toggleTheme()" class="p-2 bg-slate-200 dark:bg-slate-800 rounded-full w-10 h-10 flex items-center justify-center transition">
                        <i class="fas fa-moon dark:hidden"></i>
                        <i class="fas fa-sun hidden dark:block text-yellow-400"></i>
                    </button>

                    <a href="/reset" class="hidden md:block bg-rose-50 dark:bg-rose-900/20 hover:bg-rose-100 text-rose-600 dark:text-rose-400 text-sm font-bold py-2 px-5 rounded-full border border-rose-200 dark:border-rose-800 transition">
                        Reset
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Area (ONLY ONE BLOCK HERE) -->
    <main class="flex-grow w-full">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer class="border-t border-slate-200 dark:border-slate-800 bg-white/50 dark:bg-slate-950/50 py-8 text-center mt-auto">
        <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">
            Powered by Multi-Model Machine Learning Architecture
        </p>
    </footer>

</body>
</html>
