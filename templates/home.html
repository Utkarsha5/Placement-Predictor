{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto mt-20 text-center px-6">
    <div class="inline-flex items-center space-x-2 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-300 px-4 py-2 rounded-full text-sm font-bold mb-8">
        <span class="relative flex h-2 w-2">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-indigo-600"></span>
        </span>
        <span>Advanced AI Placement Prediction</span>
    </div>

    <h1 class="text-6xl md:text-7xl font-extrabold text-slate-900 dark:text-white mb-8 tracking-tight">
        Master Your <span class="bg-clip-text text-transparent bg-gradient-to-r from-indigo-500 to-violet-500">Career Path</span>
    </h1>
    
    <p class="text-xl text-slate-500 dark:text-slate-400 mb-12 leading-relaxed max-w-2xl mx-auto">
        Utilize our Multi-Model AI architecture to predict your placement probability and get personalized training recommendations.
    </p>

    <div class="flex flex-col md:flex-row justify-center items-center space-y-4 md:space-y-0 md:space-x-6">
        <a href="/predictor" class="w-full md:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-10 rounded-2xl shadow-xl shadow-indigo-200 dark:shadow-none transition-all hover:-translate-y-1">
            Start Analysis
        </a>
        <a href="/gym" class="w-full md:w-auto bg-white dark:bg-slate-900 text-slate-900 dark:text-white font-bold py-4 px-10 rounded-2xl border border-slate-200 dark:border-slate-800 transition-all">
            Training Gym
        </a>
    </div>
</div>
{% endblock %}
